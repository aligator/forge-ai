services:
  forgejo:
    build: docker/forgejo-dev
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO_URL: http://localhost:3000
      FORGEJO__server__ROOT_URL: http://localhost:3000/
      FORGEJO__server__SSH_DOMAIN: localhost
      FORGEJO__server__SSH_PORT: "2222"
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__database__PATH: /data/gitea/data/forgejo.db
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__security__SECRET_KEY: local-dev-secret-key-change-me
      FORGEJO__security__INTERNAL_TOKEN: local-dev-internal-token-change-me
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__webhook__ALLOWED_HOST_LIST: forge-ai,host.lima.internal,host.docker.internal,localhost,127.0.0.1
      FORGEJO_BOOTSTRAP_USER: ${FORGEJO_BOOTSTRAP_USER:-forge-ai}
      FORGEJO_BOOTSTRAP_PASSWORD: ${FORGEJO_BOOTSTRAP_PASSWORD:-forge-ai-password}
      FORGEJO_BOOTSTRAP_EMAIL: ${FORGEJO_BOOTSTRAP_EMAIL:-forge-ai@example.invalid}
      FORGEJO_BOOTSTRAP_REPO: ${FORGEJO_BOOTSTRAP_REPO:-demo}
      FORGEJO_BOOTSTRAP_ISSUE: ${FORGEJO_BOOTSTRAP_ISSUE:-true}
      FORGEJO_DEV_USER: ${FORGEJO_DEV_USER:-forge-user}
      FORGEJO_DEV_PASSWORD: ${FORGEJO_DEV_PASSWORD:-user-password}
      FORGEJO_DEV_EMAIL: ${FORGEJO_DEV_EMAIL:-forge-user@example.invalid}
      TRIGGER_LABEL: ${TRIGGER_LABEL:-ai}
      WEBHOOK_TARGET_URL: ${WEBHOOK_TARGET_URL:-http://forge-ai:8080/webhook}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/api/v1/repos/${FORGEJO_BOOTSTRAP_USER:-forge-ai}/${FORGEJO_BOOTSTRAP_REPO:-demo} > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
      - "2222:22"

  forge-ai:
    profiles: [prod]
    build:
      context: .
      args:
        AGENT_UID: ${UID:-1000}
        AGENT_GID: ${GID:-1000}
    restart: unless-stopped
    depends_on:
      forgejo:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      FORGEJO_URL: ${FORGEJO_URL:-http://forgejo:3000}
      FORGEJO_TOKEN: ${FORGEJO_TOKEN:-}
      FORGEJO_BOOTSTRAP_TOKEN: ${FORGEJO_BOOTSTRAP_TOKEN:-true}
      FORGEJO_BOOTSTRAP_USER: ${FORGEJO_BOOTSTRAP_USER:-forge-ai}
      FORGEJO_BOOTSTRAP_PASSWORD: ${FORGEJO_BOOTSTRAP_PASSWORD:-forge-ai-password}
      CLONE_URL_BASE: ${CLONE_URL_BASE:-http://forgejo:3000}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      TRIGGER_MENTION: ${TRIGGER_MENTION:-@forge-ai}
      WORKSPACE_DIR: /var/lib/forge-ai/workspaces
      BRANCH_PREFIX: ${BRANCH_PREFIX:-forge-ai}
      CREATE_PR: ${CREATE_PR:-true}
      MAX_CONCURRENT: ${MAX_CONCURRENT:-1}
      AGENT_BIN: ${AGENT_BIN:-claude}
      AGENT_ARGS: ${AGENT_ARGS:---dangerously-skip-permissions --allowedTools Bash,Read,Write,Edit,MultiEdit,Glob,Grep -p}
      AGENT_ALLOW_GIT: ${AGENT_ALLOW_GIT:-false}
      AGENT_TIMEOUT: ${AGENT_TIMEOUT:-30m}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - forge-ai-workspaces:/var/lib/forge-ai/workspaces
      - ${CLAUDE_CONFIG_DIR:-${HOME}/.claude}:/home/agent/.claude
      - ${CODEX_CONFIG_DIR:-${HOME}/.codex}:/home/agent/.codex

volumes:
  forge-ai-workspaces:

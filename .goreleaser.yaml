version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: forge-ai
    main: .
    binary: forge-ai
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: forge-ai
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

dockers_v2:
  - id: forge-ai
    dockerfile: Dockerfile
    extra_files:
      - scripts/docker-entrypoint.sh
      - scripts/forge-ai-mock-agent
      - scripts/agent-config/claude.json
      - scripts/agent-config/claude-settings.json
      - scripts/agent-config/codex.toml
      - scripts/agent-config/opencode.json
    images:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai"
    tags:
      - "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

  - id: forge-ai-latest
    dockerfile: Dockerfile
    extra_files:
      - scripts/docker-entrypoint.sh
      - scripts/forge-ai-mock-agent
      - scripts/agent-config/claude.json
      - scripts/agent-config/claude-settings.json
      - scripts/agent-config/codex.toml
      - scripts/agent-config/opencode.json
    images:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai"
    tags:
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
    disable: "{{ if .Prerelease }}true{{ end }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto

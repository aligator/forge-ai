version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: forge-ai
    main: .
    binary: forge-ai
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: forge-ai
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

dockers:
  - id: forge-ai-amd64
    goos: linux
    goarch: amd64
    use: buildx
    dockerfile: Dockerfile.release
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - scripts/forge-ai-mock-agent
      - scripts/docker-entrypoint.sh

  - id: forge-ai-arm64
    goos: linux
    goarch: arm64
    use: buildx
    dockerfile: Dockerfile.release
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - scripts/forge-ai-mock-agent
      - scripts/docker-entrypoint.sh

  - id: forge-ai-amd64-latest
    goos: linux
    goarch: amd64
    use: buildx
    dockerfile: Dockerfile.release
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - scripts/forge-ai-mock-agent
      - scripts/docker-entrypoint.sh
    skip_push: "{{ if .Prerelease }}true{{ end }}"

  - id: forge-ai-arm64-latest
    goos: linux
    goarch: arm64
    use: buildx
    dockerfile: Dockerfile.release
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - scripts/forge-ai-mock-agent
      - scripts/docker-entrypoint.sh
    skip_push: "{{ if .Prerelease }}true{{ end }}"

docker_manifests:
  - name_template: "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:{{ .Version }}"
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:{{ .Version }}-arm64"
  - name_template: "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:latest"
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:latest-amd64"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/forge-ai:latest-arm64"
    skip_push: "{{ if .Prerelease }}true{{ end }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
